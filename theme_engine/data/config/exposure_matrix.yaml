# =============================================================================
# Exposure Matrix B  (Asset-Class × Macro Driver sensitivities)
# =============================================================================
# R_a = α_a + Σ_d (β_{a,d} * δ_d) + ε_a
#
# Sign convention:
#   Positive β  → asset BENEFITS from an INCREASE in the driver
#   Negative β  → asset SUFFERS from an INCREASE in the driver
# =============================================================================

asset_classes:
  - international_equities
  - australian_equities
  - hedge_funds
  - infrastructure
  - property
  - private_credit
  - inflation_linked_bonds
  - cash
  - australian_bonds
  - us_bonds
  - aaa_overlay
  - other_strategies

macro_drivers:
  - expected_growth
  - expected_inflation
  - real_rates
  - equity_risk_premium
  - credit_premium
  - liquidity
  - commodity_supply
  - fx_risk_appetite
  - policy_uncertainty

# B[asset_class][driver] — 7 assets × 9 drivers
# Values are RETURN sensitivities: β = expected return change (decimal)
# per 1σ shock in the macro driver.  Calibrated so that a 1σ growth
# shock ≈ +5 % for DM equities, etc.
