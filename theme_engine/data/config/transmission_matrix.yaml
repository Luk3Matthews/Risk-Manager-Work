# =============================================================================
# Transmission Matrix T
# =============================================================================
# Maps theme categories to macro driver shock DIRECTIONS.
# Rows = macro drivers, Columns = theme categories.
# Values represent the typical directional sensitivity (signed, unit-free).
# The analyst can OVERRIDE any entry at runtime.
#
# Sign convention:
#   Positive = driver increases when the theme materialises
#   Negative = driver decreases when the theme materialises
# =============================================================================

macro_drivers:
  - expected_growth
  - expected_inflation
  - real_rates
  - equity_risk_premium
  - credit_premium
  - liquidity
  - commodity_supply
  - fx_risk_appetite
  - policy_uncertainty

theme_categories:
  - GEOPOLITICAL
  - GROWTH
  - INFLATION
  - LIQUIDITY
  - STRUCTURAL
  - POLICY
  - VALUATION
  - CONTAGION

# T[driver][category] — 9 drivers × 8 categories
matrix:
  expected_growth:
