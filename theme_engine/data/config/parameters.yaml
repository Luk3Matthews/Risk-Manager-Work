# =============================================================================
# Theme Engine — Global Parameters
# =============================================================================

# Evidence scoring weights (Module 2)
evidence:
  w_credibility: 0.4
  w_timeliness: 0.3
  w_corroboration: 0.3
  corroboration_saturation_k: 3       # corroboration count saturation
  half_life_days: 30                   # recency decay half-life
  theme_strength_alpha: 0.5           # likelihood vs confidence blend

# Scenario (Module 3)
scenario:
  magnitude_sigma:
    SMALL: 0.5
    MODERATE: 1.0
    LARGE: 1.5
    EXTREME: 2.5
  same_category_correlation: 0.6      # ρ for themes in same category
  cross_category_correlation: 0.2     # ρ for themes in different categories

# Indicator processing (Module 4)
indicators:
  lookback_trading_days: 1260         # 5 years
  composite_method: "pca"             # pca | equal | inverse_variance
  confirmation_beta: 0.5             # dampening factor for "already priced"

# Factor model (Module 5)
factor_model:
  baseline_returns:                   # annualised baseline expected returns
    international_equities: 0.075
    australian_equities: 0.070
    hedge_funds: 0.060
    infrastructure: 0.065
    property: 0.060
    private_credit: 0.055
    inflation_linked_bonds: 0.035
    cash: 0.020
    australian_bonds: 0.030
    us_bonds: 0.030
    aaa_overlay: 0.010
    other_strategies: 0.045
  residual_volatility:                # annualised idiosyncratic vol
    international_equities: 0.05
    australian_equities: 0.05
    hedge_funds: 0.04
    infrastructure: 0.04
    property: 0.04
    private_credit: 0.03
    inflation_linked_bonds: 0.03
    cash: 0.01
    australian_bonds: 0.03
    us_bonds: 0.03
    aaa_overlay: 0.02
    other_strategies: 0.04

# Portfolio (Module 6)
portfolio:
  default_weights:
    international_equities: 0.3145
    australian_equities: 0.1504
    hedge_funds: 0.1053
    infrastructure: 0.0981
    property: 0.0897
    private_credit: 0.0888
    inflation_linked_bonds: 0.0539
    cash: 0.0358
    australian_bonds: 0.0381
    us_bonds: 0.0110
    aaa_overlay: 0.0075
    other_strategies: 0.0069
  stress_multiplier: 0.5             # vol scaling under stress
  delta_rho_stress: 0.1              # correlation increase under stress
  cvar_alpha: 0.05                   # CVaR confidence level
  sharpe_threshold_high: 0.5
  sharpe_threshold_low: -0.2

# Positioning thresholds
positioning:
  overweight_sharpe: 0.5
  underweight_sharpe: -0.2
  hedge_confirmation_threshold: 0.3   # low confirmation = unpriced
  hedge_impact_threshold: -0.02       # large negative portfolio impact

# News sifter
news_sifter:
  news_monitor_db: "../news_monitor/news_monitor.db"
  default_lookback_hours: 72
  min_confidence: 0.1
  source_credibility:
    bing: 0.8
    gdelt: 0.6
    bloomberg: 0.95
    manual: 0.7
  batch_size: 500

# Dashboard
dashboard:
  max_themes_displayed: 25
  decimal_places: 4
  output_dir: "outputs"
