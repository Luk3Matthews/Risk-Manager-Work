# ═══════════════════════════════════════════════════════════════════════════════
# BLOOMBERG TICKER MAPPINGS
# Maps macro factors + themes to relevant Bloomberg tickers for market confirmation
# ═══════════════════════════════════════════════════════════════════════════════

bloomberg_tickers:
  # Equity indices
  equity:
    - ticker: "SPX Index"
      name: "S&P 500"
      themes: [Growth, Liquidity, Rates]
      factor: Growth
      direction_confirms: "price_up = growth_up"
    - ticker: "AS51 Index"
      name: "ASX 200"
      themes: [Growth, Energy, FX]
      factor: Growth
      direction_confirms: "price_up = growth_up"
    - ticker: "MXWO Index"
      name: "MSCI World"
      themes: [Growth, Geopolitics]
      factor: Growth
      direction_confirms: "price_up = growth_up"
    - ticker: "MXEF Index"
      name: "MSCI EM"
      themes: [Growth, Geopolitics, FX]
      factor: Growth
      direction_confirms: "price_up = growth_up"
    - ticker: "VIX Index"
      name: "VIX"
      themes: [Liquidity, Geopolitics, Credit]
      factor: Liquidity
      direction_confirms: "price_up = liquidity_down"

  # Rates / bonds
  rates:
    - ticker: "USGG10YR Index"
      name: "US 10Y Treasury Yield"
      themes: [Rates, Inflation, Growth]
      factor: Rates
      direction_confirms: "yield_up = rates_up"
    - ticker: "USGG2YR Index"
      name: "US 2Y Treasury Yield"
      themes: [Rates, Policy]
      factor: Policy
      direction_confirms: "yield_up = hawkish"
    - ticker: "GACGB10 Index"
      name: "AU 10Y Govt Bond Yield"
      themes: [Rates, Inflation]
      factor: Rates
      direction_confirms: "yield_up = rates_up"
    - ticker: "GDBR10 Index"
      name: "German 10Y Bund Yield"
      themes: [Rates]
      factor: Rates
      direction_confirms: "yield_up = rates_up"
    - ticker: "USYC2Y10 Index"
      name: "US 2s10s Curve"
      themes: [Growth, Rates]
      factor: Growth
      direction_confirms: "steeper = growth_up"

  # Credit
  credit:
    - ticker: "CDX IG CDSI GEN 5Y Corp"
      name: "CDX IG 5Y"
      themes: [Credit, Liquidity]
      factor: CreditSpreads
      direction_confirms: "spread_up = credit_stress"
    - ticker: "CDX HY CDSI GEN 5Y Corp"
      name: "CDX HY 5Y"
      themes: [Credit, Liquidity, Growth]
      factor: CreditSpreads
      direction_confirms: "spread_up = credit_stress"
    - ticker: "ITRX EUR CDSI GEN 5Y Corp"
      name: "iTraxx Europe 5Y"
      themes: [Credit]
      factor: CreditSpreads
      direction_confirms: "spread_up = credit_stress"

  # FX
  fx:
    - ticker: "DXY Curncy"
      name: "US Dollar Index"
      themes: [FX, Geopolitics]
      factor: FX
      direction_confirms: "price_up = USD_strong"
    - ticker: "AUDUSD Curncy"
      name: "AUD/USD"
      themes: [FX, Growth, Energy]
      factor: FX
      direction_confirms: "price_up = risk_on"
    - ticker: "EURUSD Curncy"
      name: "EUR/USD"
      themes: [FX]
      factor: FX
      direction_confirms: "price_up = USD_weak"
    - ticker: "USDJPY Curncy"
      name: "USD/JPY"
      themes: [FX, Rates]
      factor: FX
      direction_confirms: "price_up = USD_strong_vs_JPY"

  # Commodities
  commodities:
    - ticker: "CL1 Comdty"
      name: "WTI Crude Oil Front Month"
      themes: [Energy, Geopolitics, Inflation]
      factor: CommoditySupply
      direction_confirms: "price_up = supply_tight"
    - ticker: "CO1 Comdty"
      name: "Brent Crude Front Month"
      themes: [Energy, Geopolitics, Inflation]
      factor: CommoditySupply
      direction_confirms: "price_up = supply_tight"
    - ticker: "XAU Curncy"
      name: "Gold"
      themes: [Geopolitics, Inflation, FX]
      factor: Geopolitics
      direction_confirms: "price_up = risk_off"
    - ticker: "SCOA Comdty"
      name: "Iron Ore (SGX)"
      themes: [Growth, Energy]
      factor: Growth
      direction_confirms: "price_up = china_demand"
    - ticker: "HG1 Comdty"
      name: "Copper"
      themes: [Growth]
      factor: Growth
      direction_confirms: "price_up = growth_up"

  # Inflation
  inflation:
    - ticker: "USGGBE10 Index"
      name: "US 10Y Breakeven Inflation"
      themes: [Inflation]
      factor: Inflation
      direction_confirms: "rate_up = inflation_expected"
    - ticker: "USGGBE05 Index"
      name: "US 5Y Breakeven Inflation"
      themes: [Inflation]
      factor: Inflation
      direction_confirms: "rate_up = inflation_expected"

# ═══════════════════════════════════════════════════════════════════════════════
# DIRECTION SIGNALS
# Keywords that indicate directional bias in article text
# ═══════════════════════════════════════════════════════════════════════════════

direction_signals:
  up:
    - "surge"
    - "soar"
    - "spike"
    - "jump"
    - "rise"
    - "rally"
    - "climb"
    - "increase"
    - "higher"
    - "escalate"
    - "accelerate"
    - "overshoot"
    - "breakout"
    - "widening"
    - "tighten"
    - "hawkish"
    - "hike"
  down:
    - "crash"
    - "plunge"
    - "slump"
    - "fall"
    - "drop"
    - "decline"
    - "collapse"
    - "tumble"
    - "lower"
    - "decelerate"
    - "ease"
    - "dovish"
    - "cut"
    - "shrink"
    - "contraction"
    - "narrowing"
  neutral:
    - "steady"
    - "unchanged"
    - "stable"
    - "hold"
    - "pause"
    - "mixed"
    - "flat"

# ═══════════════════════════════════════════════════════════════════════════════
# HORIZON SIGNALS
# ═══════════════════════════════════════════════════════════════════════════════

horizon_signals:
  short:  # 0-6 months
    - "immediate"
    - "today"
    - "this week"
    - "near-term"
    - "imminent"
    - "next month"
    - "Q1"
    - "Q2"
    - "Q3"
    - "Q4"
  medium:  # 6-12 months
    - "next year"
    - "2027"
    - "medium-term"
    - "outlook"
    - "forecast"
  long:  # 12-24 months
    - "long-term"
    - "structural"
    - "multi-year"
    - "secular"
    - "decade"
