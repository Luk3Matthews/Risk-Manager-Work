# ═══════════════════════════════════════════════════════════════════════════════
# TAXONOMY & MACRO FACTOR MAPPING
# Defines themes, macro factors, keyword rules, and Bloomberg ticker mappings
# ═══════════════════════════════════════════════════════════════════════════════

themes:
  Geopolitics:
    description: "Wars, sanctions, territorial disputes, political instability"
    keywords:
      - "war"
      - "sanctions"
      - "military"
      - "invasion"
      - "conflict"
      - "geopolitical"
      - "tensions"
      - "missile"
      - "nuclear"
      - "blockade"
      - "strait"
      - "coup"
      - "regime"
      - "territorial"
    phrases:
      - "trade war"
      - "arms race"
      - "regime change"
      - "proxy war"
      - "diplomatic crisis"
      - "Strait of Hormuz"
      - "South China Sea"
      - "Taiwan Strait"

  Energy:
    description: "Oil, gas, renewables supply/demand, OPEC decisions"
    keywords:
      - "oil"
      - "crude"
      - "brent"
      - "WTI"
      - "OPEC"
      - "petroleum"
      - "natural gas"
      - "LNG"
      - "pipeline"
      - "refinery"
      - "shale"
      - "drilling"
      - "barrel"
      - "energy"
    phrases:
      - "production cut"
      - "supply disruption"
      - "oil embargo"
      - "energy crisis"
      - "spare capacity"
      - "strategic reserve"
      - "oil price"
      - "fuel shortage"

  Inflation:
    description: "Consumer/producer prices, wage growth, cost pressures"
    keywords:
      - "inflation"
      - "CPI"
      - "PPI"
      - "deflation"
      - "disinflation"
      - "stagflation"
      - "prices"
      - "wage"
      - "cost"
      - "tariff"
    phrases:
      - "consumer prices"
      - "price pressures"
      - "wage growth"
      - "cost of living"
      - "inflation expectations"
      - "core inflation"
      - "sticky inflation"
      - "price spiral"
      - "inflation surprise"

  Rates:
    description: "Central bank policy, bond yields, rate expectations"
    keywords:
      - "rate"
      - "yield"
      - "bond"
      - "treasury"
      - "gilt"
      - "bund"
      - "hike"
      - "cut"
      - "dovish"
      - "hawkish"
      - "tightening"
      - "easing"
      - "QE"
      - "QT"
    phrases:
      - "rate hike"
      - "rate cut"
      - "interest rate"
      - "yield curve"
      - "inverted curve"
      - "bond selloff"
      - "quantitative easing"
      - "quantitative tightening"
      - "forward guidance"
      - "terminal rate"
      - "neutral rate"

  Credit:
    description: "Corporate credit, defaults, spreads, leveraged lending"
    keywords:
      - "default"
      - "downgrade"
      - "restructuring"
      - "bankruptcy"
      - "leverage"
      - "covenant"
      - "junk"
      - "distressed"
      - "spread"
    phrases:
      - "credit spread"
      - "high yield"
      - "investment grade"
      - "credit crunch"
      - "loan default"
      - "corporate debt"
      - "spread widening"
      - "credit risk"

  FX:
    description: "Currency markets, capital flows, FX intervention"
    keywords:
      - "dollar"
      - "euro"
      - "yen"
      - "yuan"
      - "sterling"
      - "AUD"
      - "currency"
      - "forex"
      - "FX"
      - "devaluation"
      - "appreciation"
    phrases:
      - "currency war"
      - "capital flight"
      - "FX intervention"
      - "dollar strength"
      - "dollar weakness"
      - "carry trade"
      - "exchange rate"

  Liquidity:
    description: "Market liquidity, funding markets, repo, central bank balance sheets"
    keywords:
      - "liquidity"
      - "repo"
      - "funding"
      - "margin"
      - "collateral"
      - "reserves"
      - "redemption"
    phrases:
      - "liquidity crisis"
      - "margin call"
      - "bank run"
      - "funding stress"
      - "balance sheet"
      - "reserve drain"
      - "flash crash"
      - "market seizure"

  Growth:
    description: "Economic growth, recession risk, employment, PMI"
    keywords:
      - "GDP"
      - "growth"
      - "recession"
      - "employment"
      - "unemployment"
      - "PMI"
      - "manufacturing"
      - "services"
      - "output"
      - "slowdown"
      - "expansion"
    phrases:
      - "economic growth"
      - "hard landing"
      - "soft landing"
      - "labour market"
      - "job losses"
      - "growth scare"
      - "recession risk"
      - "GDP contraction"

# ═══════════════════════════════════════════════════════════════════════════════
# MACRO FACTORS
# ═══════════════════════════════════════════════════════════════════════════════

macro_factors:
  Inflation:
    themes: [Inflation, Energy]
    description: "Realized and expected inflation trajectory"
  Growth:
    themes: [Growth]
    description: "Economic growth outlook"
  Rates:
    themes: [Rates]
    description: "Interest rate level and path"
  CreditSpreads:
    themes: [Credit, Liquidity]
    description: "Corporate credit risk premium"
  FX:
    themes: [FX, Geopolitics]
    description: "Currency valuations and flows"
  Liquidity:
    themes: [Liquidity]
    description: "Market and funding liquidity"
  CommoditySupply:
    themes: [Energy, Geopolitics]
    description: "Physical commodity availability"
  Policy:
    themes: [Rates, Growth]
    description: "Fiscal and monetary policy stance"
  Geopolitics:
    themes: [Geopolitics]
    description: "Political risk and conflict"

# ═══════════════════════════════════════════════════════════════════════════════
# THEME -> FACTOR MAPPING RULES
# direction: up/down/neutral
# horizon: short (0-6m), medium (6-12m), long (12-24m), structural (24m+)
# ═══════════════════════════════════════════════════════════════════════════════

mapping_rules:
  - trigger_theme: Energy
    trigger_direction: up
    maps_to:
      - factor: Inflation
        direction: up
        confidence_boost: 0.2
      - factor: CommoditySupply
        direction: down
        confidence_boost: 0.3
      - factor: Growth
        direction: down
        confidence_boost: 0.1
    typical_horizon: short
    affected_asset_classes: [IEQ, AEQ, FI, Alternatives]

  - trigger_theme: Inflation
    trigger_direction: up
    maps_to:
      - factor: Inflation
        direction: up
        confidence_boost: 0.3
      - factor: Rates
        direction: up
        confidence_boost: 0.2
      - factor: Growth
        direction: down
        confidence_boost: 0.1
    typical_horizon: short
    affected_asset_classes: [FI, AEQ, IEQ, Property]

  - trigger_theme: Rates
    trigger_direction: up
    maps_to:
      - factor: Rates
        direction: up
        confidence_boost: 0.3
      - factor: Growth
        direction: down
        confidence_boost: 0.15
      - factor: CreditSpreads
        direction: up
        confidence_boost: 0.1
    typical_horizon: medium
    affected_asset_classes: [FI, Property, AEQ, IEQ, Credit]

  - trigger_theme: Credit
    trigger_direction: up
    maps_to:
      - factor: CreditSpreads
        direction: up
        confidence_boost: 0.3
      - factor: Growth
        direction: down
        confidence_boost: 0.15
      - factor: Liquidity
        direction: down
        confidence_boost: 0.1
    typical_horizon: short
    affected_asset_classes: [Credit, IEQ, AEQ]

  - trigger_theme: Geopolitics
    trigger_direction: up
    maps_to:
      - factor: Geopolitics
        direction: up
        confidence_boost: 0.3
      - factor: CommoditySupply
        direction: down
        confidence_boost: 0.2
      - factor: FX
        direction: up
        confidence_boost: 0.1
    typical_horizon: short
    affected_asset_classes: [IEQ, AEQ, Alternatives, FX]

  - trigger_theme: Liquidity
    trigger_direction: down
    maps_to:
      - factor: Liquidity
        direction: down
        confidence_boost: 0.3
      - factor: CreditSpreads
        direction: up
        confidence_boost: 0.2
      - factor: Growth
        direction: down
        confidence_boost: 0.1
    typical_horizon: short
    affected_asset_classes: [AEQ, IEQ, Credit, Alternatives]

  - trigger_theme: Growth
    trigger_direction: down
    maps_to:
      - factor: Growth
        direction: down
        confidence_boost: 0.3
      - factor: CreditSpreads
        direction: up
        confidence_boost: 0.15
      - factor: Rates
        direction: down
        confidence_boost: 0.1
    typical_horizon: medium
    affected_asset_classes: [AEQ, IEQ, Credit, Property]

  - trigger_theme: FX
    trigger_direction: up
    maps_to:
      - factor: FX
        direction: up
        confidence_boost: 0.3
    typical_horizon: short
    affected_asset_classes: [IEQ, FX, Alternatives]

